name: Daily Keyboard Scraper

# This tells GitHub WHEN to run the script. 
# 0 8 * * * means it runs at 8:00 AM UTC (4:00 AM Eastern Time) every single day.
on:
  schedule:
    - cron: '0 8 * * *'
  # This allows you to click a button in GitHub to run it manually whenever you want
  workflow_dispatch: 

# We need permission to push the updated database back to the repository
permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python on the virtual machine
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Ensure this matches your version

      # 3. Install BeautifulSoup, requests, thefuzz, etc.
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run the scrapers independently
      - name: Run Divinikey Scraper
        run: python scrapers/divinikey_scraper.py
        continue-on-error: true

      - name: Run Kinetic Labs Scraper
        run: python scrapers/kineticlabs_scraper.py
        continue-on-error: true

      - name: Run KBDfans Scraper
        run: python scrapers/kbdfans_scraper.py
        continue-on-error: true

      - name: Run CannonKeys Scraper
        run: python scrapers/cannonkeys_scraper.py
        continue-on-error: true

      # 5. Save the updated database back to GitHub
      - name: Commit and Push Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keyboard_prices.db
          # Only commit if there are actually changes to the DB
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated database update: Daily scrape" && git push)